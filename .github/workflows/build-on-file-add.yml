      # Step 7: Validate file structure
      - name: Validate File Structure
        run: |
          cd /tmp/kailos_build/kailos_quantum
          echo "🔍 Validating Kailos-Quantum structure..."
          
          # Required files (core architecture)
          REQUIRED_FILES=(
            "core/llm.py"
            "memory/holographic.py"
            "visuals/dashboard.py"
            "main.py"
          )
          
          # Optional but recommended
          OPTIONAL_FILES=(
            "core/__init__.py"
            "memory/__init__.py"
            "visuals/__init__.py"
          )
          
          MISSING=0
          for file in "${REQUIRED_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ Found: $file"
              # Show file size and first line
              SIZE=$(wc -c < "$file" | xargs)
              FIRST=$(head -1 "$file" | cut -c1-50)
              echo "   📏 Size: $SIZE bytes"
              echo "   📝 First line: $FIRST"
            else
              echo "❌ Missing: $file"
              MISSING=$((MISSING + 1))
            fi
          done
          
          for file in "${OPTIONAL_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "✅ Found (optional): $file"
            fi
          done
          
          if [ $MISSING -gt 0 ]; then
            echo "⚠️  Warning: $MISSING required files missing"
            # Don't fail yet - we might have placeholders
          fi
          
          echo "✅ Structure validation complete"
      
      # Step 8: Run linting
      - name: Run Linting
        run: |
          cd /tmp/kailos_build/kailos_quantum
          echo "🔎 Running pylint analysis..."
          
          # Find Python files
          PY_FILES=$(find . -name "*.py" -not -path "*/\.*" | wc -l)
          echo "Found $PY_FILES Python files"
          
          # Run pylint with low threshold to not fail the build
          find . -name "*.py" -not -path "*/\.*" -exec pylint --exit-zero {} \;
          
