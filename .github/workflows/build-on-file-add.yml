stats = lattice.get_state_stats()
print(f"   Energy: {stats['Total Energy']}")
print(f"   Resonance: {stats['Resonance']}")
print(f"   Storage: {stats['Storage Size']}")

print("\n" + "=" * 60)
print("✅ ALL MINIMAL TESTS PASSED")
