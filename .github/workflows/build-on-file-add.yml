# =============================================================================
# GitHub Action: Auto-Build Kailos-Quantum Repository
# =============================================================================
# Triggers: ANY file addition to the "Repo" folder
#   - New files at any depth (Repo/**)
#   - Any file type (.py, .md, .txt, .json, etc.)
#   - Files added via push, merge, or direct upload
# =============================================================================

name: Build Kailos-Quantum on File Add

on:
  # Trigger on any push that adds files to Repo folder
  push:
    paths:
      - 'Repo/**'  # ANY file addition to Repo folder or subfolders
    # Note: This triggers on ANY change to files in Repo/**
    # Including: additions, modifications, and deletions
    
  # Allow manual triggering for testing
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual build validation'
  
  # Also trigger on pull requests that modify Repo folder
  pull_request:
    paths:
      - 'Repo/**'
    types: [opened, synchronize, reopened]

# Ensure only one workflow runs at a time for this path
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-and-validate:
    name: Detect File Additions & Validate Build
    runs-on: ubuntu-latest
    outputs:
      files_added: ${{ steps.detect-files.outputs.files_added }}
      added_count: ${{ steps.detect-files.outputs.added_count }}
    
    steps:
      # Step 1: Checkout the repository with full history
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit for comparison
      
      # Step 2: Detect files added to Repo folder
      - name: Detect Added Files
        id: detect-files
        run: |
          echo "🔍 Detecting files added to Repo/ folder..."
          
          # For push events, compare with previous commit
          if [ "${{ github.event_name }}" == "push" ]; then
            # Get list of files added in this push (not modified, just added)
            ADDED_FILES=$(git diff --name-only --diff-filter=A HEAD^ HEAD | grep "^Repo/" || echo "")
            
            # Also get list of files that are new (untracked) - for completeness
            NEW_FILES=$(git ls-files --others --exclude-standard --directory --no-empty-directory | grep "^Repo/" || echo "")
            
            # Combine and deduplicate
            ALL_ADDED=$(echo -e "$ADDED_FILES\n$NEW_FILES" | sort -u | grep -v '^$' || echo "")
            
          # For pull requests, compare with base
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            ALL_ADDED=$(git diff --name-only --diff-filter=A ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | grep "^Repo/" || echo "")
          
          # For manual trigger, just list all files in Repo
          else
            ALL_ADDED=$(find Repo -type f 2>/dev/null || echo "")
          fi
          
          # Count files
          if [ -n "$ALL_ADDED" ]; then
            COUNT=$(echo "$ALL_ADDED" | wc -l)
            echo "files_added=true" >> $GITHUB_OUTPUT
            echo "added_count=$COUNT" >> $GITHUB_OUTPUT
            
            echo "📋 Files added ($COUNT total):"
            echo "$ALL_ADDED" | while read file; do
              echo "   ➕ $file"
            done
            
            # Save to file for later steps
            echo "$ALL_ADDED" > /tmp/added_files.txt
          else
            echo "files_added=false" >> $GITHUB_OUTPUT
            echo "added_count=0" >> $GITHUB_OUTPUT
            echo "ℹ️ No new files detected in Repo/ folder"
          fi
      
      # Step 3: Show trigger details
      - name: Display Trigger Information
        run: |
          echo "======================================"
          echo "🚀 TRIGGER INFORMATION"
          echo "======================================"
          echo "Event: ${{ github.event_name }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
          echo ""
          echo "Files Added: ${{ steps.detect-files.outputs.added_count }}"
          echo "======================================"
  
  build-and-validate:
    name: Build & Validate Kailos-Quantum
    needs: detect-and-validate
    # Always run if this is a manual trigger, otherwise only if files were added
    if: ${{ github.event_name == 'workflow_dispatch' || needs.detect-and-validate.outputs.files_added == 'true' }}
    runs-on: ubuntu-latest
    
    # Container with Python and build tools
    container:
      image: python:3.10-slim
    
    steps:
      # Step 1: Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      # Step 2: Display added files from previous job
      - name: Display Added Files
        run: |
          if [ -f /tmp/added_files.txt ]; then
            echo "📂 Building from newly added files:"
            cat /tmp/added_files.txt | while read file; do
              echo "   📄 $file"
            done
          else
            echo "📂 Manual trigger - building all files in Repo/"
            find Repo -type f 2>/dev/null | while read file; do
              echo "   📄 $file"
            done || echo "   ℹ️ No files found in Repo/"
          fi
      
      # Step 3: Set up Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      # Step 4: Install system dependencies
      - name: Install System Dependencies
        run: |
          apt-get update && apt-get install -y \
            build-essential \
            curl \
            git \
            tree \
            && rm -rf /var/lib/apt/lists/*
      
      # Step 5: Create build directory and copy files
      - name: Prepare Build Directory
        run: |
          echo "🔧 Preparing Kailos-Quantum build..."
          
          # Create target build directory
          BUILD_DIR="/tmp/kailos_build/kailos_quantum"
          mkdir -p $BUILD_DIR
          
          # If Repo folder exists, copy ALL contents (not just added files)
          if [ -d "Repo" ]; then
            echo "📋 Copying entire Repo/ contents to build directory..."
            
            # Use rsync style copy to preserve structure
            cp -r Repo/* $BUILD_DIR/ 2>/dev/null || true
            
            # Also copy hidden files if any
            cp -r Repo/.[!.]* $BUILD_DIR/ 2>/dev/null || true
          fi
          
          # Ensure required subdirectories exist
          cd $BUILD_DIR
          mkdir -p core memory visuals data
          
          # List final structure
          echo "📁 Build directory structure:"
          tree $BUILD_DIR || find $BUILD_DIR -type f | sort | head -20
          
          # If structure is empty, create placeholder files for validation
          if [ ! "$(ls -A $BUILD_DIR/core 2>/dev/null)" ]; then
            echo "⚠️  Creating validation placeholders (no core files found)"
            
            # Create minimal validation files
            cat > $BUILD_DIR/core/llm.py << 'EOF'
