print(f"   Lattice dimensions: {len(lattice.state)}")
print(f"   Initial energy: {np.linalg.norm(lattice.state):.4f}")
assert len(lattice.state) == 384, "Lattice should be 384-dimensional"

# Test 2: Process input (simulated)
print("\n📝 Test 2: Input Processing")
test_input = "This is a test input for build validation."
resonance = lattice.process_input(test_input)
print(f"   Resonance result: {resonance:.4f}")

# Test 3: Stats generation
