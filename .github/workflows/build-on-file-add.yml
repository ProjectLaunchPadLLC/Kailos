#!/usr/bin/env python3
"""
Kailos-Quantum Build Validation Test
Tests all modules and basic functionality
"""

import sys
import os
import importlib
import traceback
from pathlib import Path

print("=" * 70)
print(" KAILOS-QUANTUM BUILD VALIDATION")
print("=" * 70)

# Add current directory to path
sys.path.insert(0, '.')

# Modules to test with their expected components
TEST_MODULES = [
    {
        'name': 'core.llm',
        'components': ['ResponseGenerator'],
        'description': 'Cortical Engine'
    },
    {
        'name': 'memory.holographic',
        'components': ['HolographicLattice'],
        'description': 'Memory Lattice'
    },
    {
        'name': 'visuals.dashboard',
        'components': ['print_quantum_state', 'visualize_heatmap', 'dream_state'],
        'description': 'Visual Topology'
    },
    {
        'name': 'main',
        'components': None,
        'description': 'Main Orchestrator'
    }
]

# Track results
results = {
    'passed': [],
    'failed': [],
    'warnings': []
}

# Test each module
for module_info in TEST_MODULES:
    module_name = module_info['name']
    description = module_info['description']
    required_components = module_info['components']
    
    print(f"\n📦 Testing: {module_name} ({description})")
    print("-" * 50)
    
    try:
        # Attempt to import the module
        module = importlib.import_module(module_name)
        print(f"   ✅ Module imported successfully")
        
        # Check for required components
        if required_components:
            for component in required_components:
                if hasattr(module, component):
                    print(f"   ✅ Found component: {component}")
                else:
                    print(f"   ❌ Missing component: {component}")
                    results['failed'].append(f"{module_name}.{component}")
        
        # Module passed
        results['passed'].append(module_name)
        
    except Exception as e:
        print(f"   ❌ Import failed: {type(e).__name__}: {e}")
        traceback.print_exc(limit=1)
        results['failed'].append(module_name)

# Print summary
print("\n" + "=" * 70)
print(" VALIDATION SUMMARY")
print("=" * 70)
print(f"✅ Passed: {len(results['passed'])} modules")
print(f"❌ Failed: {len(results['failed'])} modules")

if results['passed']:
    print("\n📋 Successfully imported:")
    for module in results['passed']:
        print(f"   ✅ {module}")

if results['failed']:
    print("\n❌ Failed imports:")
    for module in results['failed']:
        print(f"   ❌ {module}")

print("\n" + "=" * 70)

# Exit with appropriate code
if results['failed'] and not os.environ.get('CI_ALLOW_PARTIAL'):
    print("❌ BUILD VALIDATION FAILED")
    sys.exit(1)
else:
    print("✅ BUILD VALIDATION COMPLETE")
    sys.exit(0)
